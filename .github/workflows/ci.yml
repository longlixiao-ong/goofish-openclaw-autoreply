name: ci

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile checks
        run: |
          python -m py_compile goofish-bridge/app.py
          python -m py_compile goofish-watcher/watcher.py
          python -m py_compile mock-openclaw/app.py
          python -m py_compile scripts/production_preflight.py
          python -m py_compile scripts/check_inbound_workflow.py
          python -m py_compile scripts/test_bridge_send_guard.py
          python -m py_compile scripts/test_openclaw_reply.py

      - name: JSON checks
        run: |
          python -m json.tool n8n/workflows/goofish-inbound.example.json > /dev/null

      - name: Offline tests
        run: |
          python scripts/check_inbound_workflow.py
          python scripts/test_bridge_send_guard.py
          python scripts/test_openclaw_reply.py --self-check
