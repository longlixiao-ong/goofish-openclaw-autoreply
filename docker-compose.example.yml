services:
  n8n:
    image: n8nio/n8n:latest
    restart: always
    env_file:
      - .env
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - TZ=Asia/Shanghai
    volumes:
      - ./n8n_data:/home/node/.n8n
      - ./n8n:/workspace/n8n
      - ./scripts:/workspace/scripts:ro
      - ./data:/workspace/data
      - ./goofish-state:/workspace/goofish-state:ro
      - ./logs:/workspace/logs

  goofish-watcher:
    build:
      context: ./goofish-watcher
    restart: always
    env_file:
      - .env
    volumes:
      - ./goofish-state:/root/.goofish-cli
      - ./logs:/app/logs
    depends_on:
      - n8n

  # Optional later: replace shell-based message sending with a long-running HTTP bridge.
