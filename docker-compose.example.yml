services:
  # n8n reads OPENCLAW_REPLY_URL from .env.
  # - mock mode (default): OPENCLAW_REPLY_URL=http://openclaw:18789/reply
  # - real mode: point OPENCLAW_REPLY_URL to your real OpenClaw /reply endpoint
  n8n:
    image: n8nio/n8n:latest
    restart: always
    env_file:
      - .env
    ports:
      - "127.0.0.1:5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - TZ=Asia/Shanghai
      - OPENCLAW_REPLY_URL=${OPENCLAW_REPLY_URL:-http://openclaw:18789/reply}
    volumes:
      - ./n8n_data:/home/node/.n8n
      - ./n8n:/workspace/n8n
      - ./data:/workspace/data
      - ./logs:/workspace/logs

  # Local default mock OpenClaw.
  # In real OpenClaw mode, keep this service defined for quick rollback,
  # but you can choose not to start it.
  openclaw:
    build:
      context: ./mock-openclaw
    restart: always
    env_file:
      - .env
    ports:
      - "127.0.0.1:18789:18789"
    expose:
      - "18789"

  goofish-watcher:
    build:
      context: ./goofish-watcher
    restart: always
    env_file:
      - .env
    volumes:
      - ./goofish-state:/root/.goofish-cli
      - ./logs:/app/logs
    depends_on:
      - n8n

  goofish-bridge:
    build:
      context: ./goofish-bridge
    restart: always
    env_file:
      - .env
    environment:
      - ITEMS_SNAPSHOT_PATH=/app/data/items_snapshot.json
    ports:
      - "127.0.0.1:8787:8787"
    volumes:
      - ./goofish-state:/root/.goofish-cli
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - n8n
