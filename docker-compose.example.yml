services:
  # n8n orchestration runtime.
  # Production mode calls goofish-bridge /autoreply/decide and /send only.
  n8n:
    image: n8nio/n8n:latest
    restart: always
    env_file:
      - .env
    ports:
      - "127.0.0.1:5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - TZ=Asia/Shanghai
      - BRIDGE_AUTH_TOKEN=${BRIDGE_AUTH_TOKEN}
    volumes:
      - ./n8n_data:/home/node/.n8n
      - ./n8n:/workspace/n8n
      - ./data:/workspace/data
      - ./logs:/workspace/logs

  # Local default mock OpenClaw (kept for rollback and local dry-run).
  openclaw:
    build:
      context: ./mock-openclaw
    restart: always
    env_file:
      - .env
    ports:
      - "127.0.0.1:18789:18789"
    expose:
      - "18789"

  goofish-watcher:
    build:
      context: ./goofish-watcher
    restart: always
    env_file:
      - .env
    volumes:
      - ./goofish-state:/root/.goofish-cli
      - ./logs:/app/logs
    depends_on:
      - n8n

  goofish-bridge:
    build:
      context: ./goofish-bridge
    restart: always
    env_file:
      - .env
    environment:
      - ITEMS_SNAPSHOT_PATH=/app/data/items_snapshot.json
      - AUTOREPLY_STATE_FILE=/app/data/autoreply-state.json
      - AUTOREPLY_RUNTIME_STATE_FILE=/app/data/autoreply-runtime-state.json
      - BRIDGE_AUTH_TOKEN=${BRIDGE_AUTH_TOKEN}
      - OPENCLAW_RUNTIME_MODE=${OPENCLAW_RUNTIME_MODE}
      - OPENCLAW_CHAT_COMPLETIONS_URL=${OPENCLAW_CHAT_COMPLETIONS_URL}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - OPENCLAW_MODEL=${OPENCLAW_MODEL}
      - OPENCLAW_TIMEOUT_SECONDS=${OPENCLAW_TIMEOUT_SECONDS:-20}
      - HANDOFF_NOTIFY_WEBHOOK_URL=${HANDOFF_NOTIFY_WEBHOOK_URL}
    ports:
      - "127.0.0.1:8787:8787"
    volumes:
      - ./goofish-state:/root/.goofish-cli
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - n8n
